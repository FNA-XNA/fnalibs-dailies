name: CI

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 0 * * *'

jobs:
  linux-sdl3-x86_64:
    name: SDL3 (Linux x86_64)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest
    steps:
    - name: Clone
      uses: actions/checkout@v6
      with:
        repository: libsdl-org/SDL
        ref: release-3.4.x
    - name: Build
      run: |
        cmake -B release -G Ninja . -DCMAKE_BUILD_TYPE=Release
        ninja -C release
        strip -S release/libSDL3.so.0
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SDL3-steamrt3-x86_64
        path: release/libSDL3.so.0

  linux-sdl3-aarch64:
    name: SDL3 (Linux AArch64)
    runs-on: ubuntu-24.04-arm
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk/arm64:latest
    steps:
    - name: Clone
      uses: actions/checkout@v6
      with:
        repository: libsdl-org/SDL
        ref: release-3.4.x
    - name: Build
      run: |
        cmake -B release -G Ninja . -DCMAKE_BUILD_TYPE=Release
        ninja -C release
        strip -S release/libSDL3.so.0
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: SDL3-steamrt3-aarch64
        path: release/libSDL3.so.0

  archive:
    name: Archive
    runs-on: ubuntu-latest
    needs: [linux-sdl3-x86_64, linux-sdl3-aarch64]
    steps:
    - uses: actions/checkout@v3

    - uses: actions/download-artifact@v4
      with:
        name: SDL3-steamrt3-x86_64
        path: SDL3-steamrt3-x86_64

    - uses: actions/download-artifact@v4
      with:
        name: SDL3-steamrt3-aarch64
        path: SDL3-steamrt3-aarch64

    - name: Build fnalibs
      run: ./build-fnalibs.sh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive fnalibs
      uses: actions/upload-artifact@v4
      with:
        name: fnalibs
        path: fnalibs/

  archive-apple:
    name: Archive (Apple)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build fnalibs-apple
      run: ./build-fnalibs-apple.sh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive fnalibs-apple
      uses: actions/upload-artifact@v4
      with:
        name: fnalibs-apple
        path: fnalibs-apple/

  archive-wasm-mt:
    name: Archive (WASM) - Multithreaded
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: emscripten-core/setup-emsdk@v15
      with:
        version: 3.1.56

    - name: Verify Emscripten
      run: emcc -v

    - name: Make build-fnalibs-wasm.sh executable
      run: chmod +x ./build-fnalibs-wasm.sh

    - name: Build fnalibs-wasm
      run: ./build-fnalibs-wasm.sh --pthread-enabled
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive fnalibs-wasm
      uses: actions/upload-artifact@v4
      with:
        name: fnalibs-wasm-multithreaded
        path: fnalibs-wasm-mt/

  archive-wasm-st:
    name: Archive (WASM) - Single threaded
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: emscripten-core/setup-emsdk@v15
      with:
        version: 3.1.56

    - name: Verify Emscripten
      run: emcc -v

    - name: Make build-fnalibs-wasm.sh executable
      run: chmod +x ./build-fnalibs-wasm.sh

    - name: Build fnalibs-wasm
      run: ./build-fnalibs-wasm.sh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Archive fnalibs-wasm
      uses: actions/upload-artifact@v4
      with:
        name: fnalibs-wasm-singlethreaded
        path: fnalibs-wasm-st/
